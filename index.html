<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Mood — Interior Design & Furniture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============================================
     Design tokens — Living Mood identity
     ============================================ */
  :root {
    --clr-bg: #F3EFEA;          /* الخلفية الكريمي المطلوبة */
    --clr-surface: #FFFFFF;
    --clr-ink: #1C1712;         /* أسود دافئ للنصوص والبار العلوي */
    --clr-ink-70: #4A423A;
    --clr-gold: #B08D57;        /* الذهبي الأساسي */
    --clr-gold-light: #D9C6A3;
    --clr-line: #E3DCD0;

    --font-display: "Playfair Display", Georgia, serif;
    --font-elegant: "Cormorant Garamond", Georgia, serif;
    --font-body: "Inter", -apple-system, "Segoe UI", sans-serif;

    --container: 1240px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--clr-bg);
    color: var(--clr-ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  button { font-family: inherit; cursor: pointer; }

  .wrap {
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ============================================
     Top strip — "LIVING MOOD — INTERIOR EXCELLENCE"
     ============================================ */
  .top-strip {
    background: var(--clr-ink);
    color: var(--clr-gold-light);
    text-align: center;
    font-family: var(--font-elegant);
    font-size: 14px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 10px 12px;
  }

  /* ============================================
     Header / hero logo block
     ============================================ */
  .brand-hero {
    text-align: center;
    padding: 64px 20px 40px;
  }

  .brand-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(42px, 7vw, 76px);
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.01em;
  }

  .brand-hero h1 .accent { color: var(--clr-gold); }

  .brand-hero .subtitle {
    font-family: var(--font-elegant);
    font-size: 15px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--clr-ink-70);
    margin-top: 10px;
  }

  .brand-divider {
    width: 70px;
    height: 2px;
    background: var(--clr-gold);
    margin: 24px auto 0;
  }

  /* ============================================
     Sticky nav bar (search / call)
     ============================================ */
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--clr-surface);
    border-bottom: 1px solid var(--clr-line);
  }

  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    max-width: var(--container);
    margin: 0 auto;
    gap: 20px;
  }

  .nav-links {
    display: flex;
    gap: 28px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--clr-ink-70);
  }

  .nav-links a:hover { color: var(--clr-gold); }

  .header-call-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--clr-ink);
    color: var(--clr-gold-light);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 10px 20px;
    border-radius: 2px;
    white-space: nowrap;
    transition: opacity .2s ease;
    border: none;
  }

  .header-call-btn:hover { opacity: .85; }

  .contact-dropdown { position: relative; }

  .contact-dropdown-menu {
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    background: var(--clr-surface);
    border: 1px solid var(--clr-line);
    border-radius: 4px;
    box-shadow: 0 14px 30px rgba(28,23,18,0.14);
    min-width: 190px;
    padding: 6px;
    display: none;
    flex-direction: column;
    gap: 4px;
    z-index: 60;
  }

  .contact-dropdown-menu.open { display: flex; }

  .contact-dropdown-menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 3px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--clr-ink);
  }

  .contact-dropdown-menu a svg { width: 17px; height: 17px; flex-shrink: 0; }

  .contact-dropdown-menu a:hover { background: var(--clr-bg); }

  .contact-dropdown-menu a.wa { color: #1f9c46; }
  .contact-dropdown-menu a.call { color: var(--clr-ink); }

  .icon-btn {
    width: 20px;
    height: 20px;
    background: none;
    border: none;
    color: var(--clr-ink);
    padding: 0;
  }
  .icon-btn svg { width: 100%; height: 100%; }

  .nav-instagram {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .nav-instagram svg { width: 20px; height: 20px; }

  .nav-instagram span {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--clr-ink-70);
    letter-spacing: 0.01em;
  }

  .menu-toggle { display: none; background: none; border: none; color: var(--clr-ink); }

  @media (max-width: 860px) {
    .nav-links { display: none; }
    .menu-toggle { display: block; }
  }

  /* ============================================
     Section title pattern
     ============================================ */
  section { padding: 56px 0; }

  .section-title {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 600;
    text-align: center;
    margin: 0 0 8px;
  }

  .section-rule {
    width: 60px;
    height: 2px;
    margin: 0 auto 40px;
    background: var(--clr-gold);
  }

  .section-rule.small { width: 40px; margin: 0 0 22px; }

  /* ============================================
     Category rail
     ============================================ */
  .category-rail {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 32px;
  }

  @media (max-width: 900px) {
    .category-rail {
      grid-auto-flow: column;
      grid-auto-columns: 150px;
      grid-template-columns: none;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x mandatory;
    }
    .category-item { scroll-snap-align: start; }
  }

  .category-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
  }

  .category-circle {
    width: 168px;
    height: 168px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--clr-gold-light);
    transition: transform .25s ease, border-color .25s ease;
  }

  .category-item:hover .category-circle {
    transform: translateY(-4px);
    border-color: var(--clr-gold);
  }

  .category-circle img { width: 100%; height: 100%; object-fit: cover; }

  .category-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* ============================================
     Banner
     ============================================ */
  .banner {
    position: relative;
    overflow: hidden;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--clr-ink);
    color: #F3EFEA;
    text-align: center;
    padding: 40px 20px;
  }

  .banner-eyebrow {
    font-family: var(--font-elegant);
    font-size: 14px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--clr-gold-light);
    margin-bottom: 14px;
  }

  .banner-title {
    font-family: var(--font-display);
    font-size: clamp(32px, 5.5vw, 60px);
    font-weight: 600;
    margin: 0 0 22px;
  }

  .banner-cta {
    display: inline-block;
    background: var(--clr-gold);
    color: var(--clr-ink);
    padding: 13px 32px;
    border-radius: 2px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: opacity .2s ease;
  }
  .banner-cta:hover { opacity: .85; }

  /* ============================================
     Catalog sections & product cards
     ============================================ */
  .catalog-section {
    margin-bottom: 56px;
    scroll-margin-top: 80px;
  }

  .catalog-section-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 6px;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }

  @media (max-width: 980px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .product-grid { grid-template-columns: 1fr 1fr; gap: 14px; } }

  .product-card {
    background: var(--clr-surface);
    overflow: hidden;
    border: 1px solid var(--clr-line);
    transition: box-shadow .25s ease, transform .25s ease;
    display: flex;
    flex-direction: column;
  }

  .product-card:hover {
    box-shadow: 0 14px 30px rgba(28,23,18,0.1);
    transform: translateY(-3px);
  }

  .product-media { aspect-ratio: 4 / 3; background: var(--clr-line); }
  .product-media img { width: 100%; height: 100%; object-fit: cover; }

  .product-info {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .product-name { font-size: 15px; font-weight: 600; line-height: 1.35; }

  .contact-actions { display: flex; gap: 8px; margin-top: auto; }

  .contact-btn {
    flex: 1;
    text-align: center;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 9px 10px;
    border-radius: 2px;
    transition: opacity .2s ease;
  }
  .contact-btn:hover { opacity: .85; }
  .contact-btn.whatsapp { background: #25D366; color: #fff; }
  .contact-btn.call { background: var(--clr-ink); color: var(--clr-gold-light); }

  .state-msg { text-align: center; color: var(--clr-ink-70); padding: 30px 0; grid-column: 1 / -1; }

  /* ============================================
     Footer
     ============================================ */
  .site-footer {
    background: var(--clr-ink);
    color: var(--clr-gold-light);
    padding: 44px 0 26px;
    margin-top: 30px;
  }

  .site-footer .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }

  .footer-brand {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
  }

  .footer-links {
    display: flex;
    align-items: center;
    gap: 26px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .footer-ig {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--clr-gold-light);
    font-size: 14px;
    font-weight: 600;
  }

  .footer-phone {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--clr-gold-light);
    font-size: 14px;
    font-weight: 600;
    direction: ltr;
  }

  .footer-note { font-size: 12.5px; color: #9C8F7D; }

  /* ============================================
     Lightbox — تكبير الصورة عند الدوس
     ============================================ */
  .product-media img { cursor: zoom-in; }

  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(28,23,18,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    width: auto;
    object-fit: contain;
    border-radius: 2px;
  }

  .lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color: #F3EFEA;
    border: none;
    font-size: 22px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>

      { id: "demo-1", name: "أنتريهات", image_url: "https://placehold.co/300x300/E3DCD0/1C1712?text=%D8%A3%D9%86%D8%AA%D8%B1%D9%8A%D9%87" },
      { id: "demo-2", name: "غرف نوم",  image_url: "https://placehold.co/300x300/E3DCD0/1C1712?text=%D8%BA%D8%B1%D9%81+%D9%86%D9%88%D9%85" },
      { id: "demo-3", name: "طاولات",   image_url: "https://placehold.co/300x300/E3DCD0/1C1712?text=%D8%B7%D8%A7%D9%88%D9%84%D8%A7%D8%AA" },
    ];

    const DEMO_PRODUCTS = [
      { name: "تصميم 1", image_url: "https://placehold.co/500x375/E3DCD0/1C1712?text=%D8%B5%D9%88%D8%B1%D8%A9", category_id: "demo-1" },
      { name: "تصميم 2", image_url: "https://placehold.co/500x375/E3DCD0/1C1712?text=%D8%B5%D9%88%D8%B1%D8%A9", category_id: "demo-1" },
      { name: "تصميم 3", image_url: "https://placehold.co/500x375/E3DCD0/1C1712?text=%D8%B5%D9%88%D8%B1%D8%A9", category_id: "demo-2" },
      { name: "تصميم 4", image_url: "https://placehold.co/500x375/E3DCD0/1C1712?text=%D8%B5%D9%88%D8%B1%D8%A9", category_id: "demo-3" },
    ];

    function buildWhatsappLink(productName) {
      const msg = encodeURIComponent(`مرحبًا، عايز أستفسر عن: ${productName}`);
      return `https://wa.me/${CONTACT_WHATSAPP}?text=${msg}`;
    }
    function buildCallLink() { return `tel:${CONTACT_PHONE}`; }
    function buildGeneralWhatsappLink() {
      const msg = encodeURIComponent("مرحبًا، عايز أستفسر عندكم");
      return `https://wa.me/${CONTACT_WHATSAPP}?text=${msg}`;
    }

    async function loadCategoryRail(categories) {
      const rail = document.getElementById("category-rail");
      rail.innerHTML = categories.map(cat => `
        <a class="category-item" href="#cat-${cat.id}">
          <span class="category-circle">
            <img src="${cat.image_url}" alt="${cat.name}" loading="lazy">
          </span>
          <span class="category-label">${cat.name}</span>
        </a>
      `).join("");
    }

    async function loadCatalog() {
      const container = document.getElementById("catalog-sections");
      let categories = DEMO_CATEGORIES;
      let products = DEMO_PRODUCTS;

      try {
        const { data: catData, error: catError } = await supabaseClient
          .from("categories")
          .select("id, name, image_url")
          .order("sort_order", { ascending: true });
        if (!catError && catData && catData.length > 0) categories = catData;

        const { data: prodData, error: prodError } = await supabaseClient
          .from("products")
          .select("name, image_url, category_id")
          .order("created_at", { ascending: false });
        if (!prodError && prodData) products = prodData;
      } catch (e) {
        console.warn("تعذر الاتصال بـ Supabase، هيتعرض بيانات تجريبية:", e);
      }

      await loadCategoryRail(categories);

      if (categories.length === 0) {
        container.innerHTML = `<p class="state-msg">لا توجد أقسام بعد.</p>`;
        return;
      }

      container.innerHTML = categories.map(cat => {
        const items = products.filter(p => p.category_id === cat.id);
        const itemsHtml = items.length > 0
          ? items.map(p => `
              <div class="product-card">
                <div class="product-media">
                  <img src="${p.image_url}" alt="${p.name}" loading="lazy">
                </div>
                <div class="product-info">
                  <div class="product-name">${p.name}</div>
                  <div class="contact-actions">
                    <a class="contact-btn whatsapp" href="${buildWhatsappLink(p.name)}" target="_blank" rel="noopener">واتساب</a>
                    <a class="contact-btn call" href="${buildCallLink()}">اتصال</a>
                  </div>
                </div>
              </div>
            `).join("")
          : `<p class="state-msg">لسه مفيش صور مضافة في القسم ده.</p>`;

        return `
          <div class="catalog-section" id="cat-${cat.id}">
            <h3 class="catalog-section-title">${cat.name}</h3>
            <div class="section-rule small"></div>
            <div class="product-grid">${itemsHtml}</div>
          </div>
        `;
      }).join("");
    }

    loadCatalog();

    // ============================================
    // روابط الاتصال / واتساب (الهيدر + الفوتر)
    // ============================================
    const headerCallLink = document.getElementById("header-call-link");
    if (headerCallLink) headerCallLink.href = buildCallLink();

    const headerWaLink = document.getElementById("header-wa-link");
    if (headerWaLink) headerWaLink.href = buildGeneralWhatsappLink();

    const footerCallLink = document.getElementById("footer-call-link");
    const footerCallText = document.getElementById("footer-call-text");
    if (footerCallLink) footerCallLink.href = buildCallLink();
    if (footerCallText) footerCallText.textContent = CONTACT_PHONE;

    // زر "اتصل بنا" في الهيدر: يفتح قائمة (اتصال / واتساب) بدل ما يتصل على طول
    const headerCallToggle = document.getElementById("header-call-toggle");
    const headerCallMenu = document.getElementById("header-call-menu");

    headerCallToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      headerCallMenu.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".contact-dropdown")) {
        headerCallMenu.classList.remove("open");
      }
    });

    // ============================================
    // Lightbox: تكبير صورة المنتج عند الدوس عليها
    // ============================================
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");
    const lightboxClose = document.getElementById("lightbox-close");

    function openLightbox(src, alt) {
      lightboxImg.src = src;
      lightboxImg.alt = alt || "";
      lightbox.classList.add("open");
    }
    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImg.src = "";
    }

    // event delegation: يشتغل حتى للصور اللي بتتضاف ديناميكيًا بعد التحميل
    document.addEventListener("click", (e) => {
      const img = e.target.closest(".product-media img");
      if (img) openLightbox(img.src, img.alt);
    });

    lightboxClose.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox(); // قفل عند الدوس بره الصورة
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });
  </script>
</body>
</html>
